pick_action_server:
  ros__parameters:
    # Topics
    result_topic: /spear_recognition/result
    tool_service: /ares_tool_node/tool_action
    chassis_topic: /t0x0111
    lift_topic: /t0x0112
    status_topic: /pick_action/status
    motion_action_name: /move_to_pose
    relocation_topic: /transformed/pose

    # ---- X alignment (prepare) ----
    prepare_offset_m: 0.3
    direction_sign_x: -1.0
    deadband_x_m: 0.005
    prepare_timeout_ms: 20000

    # ---- Forward approach ----
    forward_speed_mps: 0.2
    forward_duration_s: 4.0
    direction_sign_y: -1.0

    # ---- Grasp ----
    grasp_timeout_ms: 15000

    # ---- Lift / Lower (one-shot position commands, units: mm) ----
    lift_height_mm: [100.0, 100.0, 100.0, 100.0]

    # ---- Retreat ----
    retreat_speed_mps: 0.2
    retreat_duration_s: 2.0
    retreat_distance_m: 0.4
    retreat_motion_timeout_sec: 10.0
    retreat_motion_pid_profile: 0
    retreat_motion_max_vel: 0.0
    retreat_motion_max_wz: 0.0
    retreat_pose_timeout_sec: 1.0
    retreat_height_mm: []
    height_publish_rate_hz: 20.0

    # ---- Loop ----
    publish_rate_hz: 100.0
